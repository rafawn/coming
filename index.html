<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Próximamente - We Move Migration</title>

    <!-- iconos de Font Awesome para las redes sociales -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* fuentes */
        @font-face {
            font-family: 'Sofia Pro';
            src: url('fonts/sofia-pro/Sofia-Pro-Regular.otf') format('opentype');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Sofia Pro';
            src: url('fonts/sofia-pro/Sofia-Pro-Semi-Bold.otf') format('opentype');
            font-weight: 500;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Sofia Pro';
            src: url('fonts/sofia-pro/Sofia-Pro-Bold.otf') format('opentype');
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Sofia Pro';
            src: url('fonts/sofia-pro/Sofia-Pro-Light.otf') format('opentype');
            font-weight: 300;
            font-style: normal;
            font-display: swap;
        }


        /* estilos generales */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Sofia Pro', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* contenedor del fondo */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)),
                        url('https://images.unsplash.com/photo-1523482580672-f109ba8cb9be?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        /* contenedor principal */
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }

        /* logo */
        .logo-image{
            margin: 0 auto 2rem auto;
            width: auto;
            max-width: 20rem;
            height: auto;
        }

        /* textos */
        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 3.5rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 30px;
            letter-spacing: 3px;
        }

        p {
            max-width: 600px;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 40px;
            font-weight: 300;
        }

        /* botones */
        .btn-container {
            display: flex;
            gap: 20px;
            margin-bottom: 60px;
        }

        .btn {
            padding: 12px 30px;
            text-decoration: none;
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
            border-radius: 10rem;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .btn-primary {
            background-color: #3B2CA3;
        }

        .btn-outline {
            border: 2px solid white;
        }

        .btn:hover {
            opacity: 0.8;
            transform: translateY(-2px);
        }

        /* redes Sociales */
        .social-icons {
            display: flex;
            gap: 25px;
        }

        .social-icons a {
            color: white;
            font-size: 1.5rem;
            transition: color 0.3s ease;
        }

        .social-icons a:hover {
            color: #3B2CA3;
        }

        /* responsive */
        @media (max-width: 768px) {
            h1 { font-size: 1.5rem; }
            h2 { font-size: 2rem; }
            .btn-container { flex-direction: column; width: 100%; align-items: center; }
            .btn { width: 200px; }
        }
    </style>
</head>
    <body>
        <div class="bg-container"></div>

        <div class="main-content">
            <div class="logo-box">
                <img src="images/brand/pri_logo_white.png" alt="We Move Migration" class="logo-image" />
            </div>

            <h1>Estamos lanzando nuestro</h1>
            <h2>Nuevo Sitio Web</h2>

            <p>
                ¡Próximamente!
            </p>

            <div class="btn-container">
                <a href="https://wemoveexperience.com/australia/evaluacion-estudios-migraciones" target="_blank" class="btn btn-primary">Formulario migratorio</a>
                <a href="https://wemoveexperience.com/sobre-nosotros" target="_blank" class="btn btn-outline">Sobre nosotros</a>
            </div>

            <!--
            <div class="social-icons">
                <a href="https://facebook.com" target="_blank"><i class="fab fa-facebook-f"></i></a>
                <a href="https://instagram.com" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://tiktok.com" target="_blank"><i class="fab fa-tiktok"></i></a>
                <a href="https://youtube.com" target="_blank"><i class="fab fa-youtube"></i></a>
            </div>
            -->
        </div>
    </body>
</html>
